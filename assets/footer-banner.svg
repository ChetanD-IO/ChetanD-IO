<svg width="100%" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#11172b"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="textGradF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#58A6FF"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowF" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="160" fill="url(#bgGradF)"/>
  <circle cx="600" cy="60" r="220" fill="url(#glowF)"/>

  <!-- mirrored neural network backdrop -->
  <g stroke="#2EA3F7" stroke-opacity="0.16" stroke-width="1">
    <line x1="100" y1="120" x2="220" y2="70"/>
    <line x1="220" y1="70" x2="160" y2="20"/>
    <line x1="220" y1="70" x2="330" y2="100"/>
    <line x1="950" y1="120" x2="1070" y2="70"/>
    <line x1="1070" y1="70" x2="1010" y2="20"/>
    <line x1="1070" y1="70" x2="1160" y2="100"/>
  </g>
  <g fill="#58A6FF" fill-opacity="0.5">
    <circle cx="100" cy="120" r="3"/>
    <circle cx="220" cy="70" r="4"/>
    <circle cx="160" cy="20" r="3"/>
    <circle cx="330" cy="100" r="3"/>
    <circle cx="950" cy="120" r="3"/>
    <circle cx="1070" cy="70" r="4"/>
    <circle cx="1010" cy="20" r="3"/>
    <circle cx="1160" cy="100" r="3"/>
    <animate attributeName="fill-opacity" values="0.3;0.65;0.3" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- thin gradient divider, mirrors header underline -->
  <rect x="430" y="46" width="340" height="3" rx="1.5" fill="url(#textGradF)"/>

  <!-- main message -->
  <text x="600" y="86" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="url(#textGradF)">
    Thanks for stopping by! ⭐
  </text>
  <text x="600" y="116" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#9aa7c2" letter-spacing="0.3">
    Let's build something great together — explore my repos &amp; say hi
  </text>
</svg>
